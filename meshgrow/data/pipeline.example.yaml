modality: ct

weights_dir: ${MESHGROW_ROOT}/models

models:
  ct:
    nnunet_cardiac: ${weights_dir}/cardiac/nnUNet_cardiac_weights/Dataset015_HEARTTOTALSEGCT/nnUNetTrainer__nnUNetPlans__3d_lowres
  mr:
    nnunet_cardiac: ${weights_dir}/cardiac/nnUNet_cardiac_weights/Dataset016_HEARTMMWHSMR/nnUNetTrainer__nnUNetPlans__3d_lowres
  linflonet: ${weights_dir}/linflonet/best_model.pth
  seqseg_nnunet_root: ${weights_dir}/seqseg/nnUNet_results

zenodo:
  cardiac_record: "20804513"
  seqseg_record: "15020477"
  linflonet_record: "20802633"

nnunet:
  configuration: 3d_lowres
  fold: all
  checkpoint: checkpoint_best.pth

crop:
  padding_voxels: 20

seqseg:
  train_dataset:
    ct: Dataset006_SEQAORTANDFEMOCT
    mr: Dataset005_SEQAORTANDFEMOMR
  config_name:
    ct: global_aorta
    mr: global_aorta
  img_ext: .nii.gz
  unit: mm
  scale: 0.1
  max_n_steps: 200

combine:
  region_label: 6
  vascular_label: 1
  valve_label: 8
  keep_labels: [1, 3, 8]
  blood_aorta_labels: [3, 6]
  write_all: false
  img_ext: .vti
  vascular_ext: .vti
  smooth_iterations: 50
  smooth_boundary: false
  smooth_feature: false
  smooth_factor: 0.5

runtime:
  device: auto
  continue_on_error: false
